<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Editor.js Columns i18n Test</title>
  <link href="https://fonts.googleapis.com/css?family=PT+Mono" rel="stylesheet">
  <link href="assets/demo.css" rel="stylesheet">
  <script src="assets/json-preview.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
</head>
<body>
  <div class="ce-example">
    <div class="ce-example__header">
      <a class="ce-example__header-logo" href="https://github.com/calumk/editorjs-columns">
        <svg class="svgicon" role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><title>GitHub</title><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        @calumk/editorjs-columns - i18n Test
      </a>
    </div>
    <div class="ce-example__content _ce-example__content--small">
      <h3>Spanish Translation Test</h3>
      <p>This page tests the internationalization (i18n) functionality of the columns plugin. The tool should display Spanish labels.</p>
      
      <div class="editorjs-wrapper">
        <div id="editorjs"></div>
      </div>

      <div class="ce-example__button" id="saveButton">
        editor.save()
      </div>
    </div>
    <div class="ce-example__output">
      <pre class="ce-example__output-content" id="output"></pre>
    </div>
  </div>
</body>

  <!-- Load Official Tools -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@latest"></script>
    
  <!-- Load Local Tools -->
    <script src="../dist/editorjs-columns.bundle.js"></script>

  <!-- Load 3rd Party Tools -->
    <script src="https://cdn.jsdelivr.net/npm/editorjs-alert@latest"></script>

  <!-- Load Editor.js's Core -->
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>

  <!-- Initialization -->
  <script>

    // first define the tools to be made available in the columns
    let column_tools = {
      header: Header,
      alert : Alert,
      delimiter : Delimiter
    }

    // next define the tools in the main block
    let tools = {
      // Load Official Tools
      header: Header,
      alert : Alert,
      delimiter : Delimiter,

      columns : {
        class : editorjsColumns,
        config : {
          tools : {
            header: Header,
            alert : Alert,
            delimiter : Delimiter
          },
          EditorJsLibrary : EditorJS //ref EditorJS - This means only one global thing
        }
      },
    }

    

    editor = new EditorJS({
      readOnly: false,
      holder: 'editorjs',
      tools : tools,
      data: {
        "blocks": [
          {
            "type": "header",
            "data": {
              "text": "i18n Test - Prueba de internacionalización",
              "level": 3
            }
          },
          {
            "type": "paragraph",
            "data": {
              "text": "Add a columns block below and check that the settings menu shows Spanish text."
            }
          }
        ]
      },
      i18n: {
        messages: {
          toolNames: {
            'Columns': 'Columnas',
          },
          tools: {
            columns: {
              '2 Columns': 'Dos columnas',
              '3 Columns': 'Tres columnas', 
              'Roll Columns': 'Rotar columnas',
              'Are you sure?': '¿Está seguro?',
              'This will delete Column 3!': '¡Esto eliminará la Columna 3!',
              'Yes, delete it!': '¡Sí, eliminar!',
              'Cancel': 'Cancelar',
            },
          },
        },
      },

      onReady: function(){
        console.log("Editor ready with i18n configured");
      },
      onChange: function(e) {
        console.log('Editor changed');
      }
    });


    // Buttons
    const saveButton = document.getElementById('saveButton');

    // Save Example
    saveButton.addEventListener('click', function () {
      editor.save()
        .then((savedData) => {
          cPreview.show(savedData, document.getElementById("output"));
        })
        .catch((error) => {
          console.error('Saving error', error);
        });
    });

  </script>

<style>

/* REQUIRED STYLES */
/* LAYOUT GRID CSS (Required) This creates the actual columns */

.ce-editorjsColumns_wrapper{
	display: grid;
	column-gap: 15px;
}
.ce-editorjsColumns_wrapper.cols2{
	grid-template-columns: 1fr 1fr;
}
.ce-editorjsColumns_wrapper.cols3{
	grid-template-columns: 1fr 1fr 1fr;
}
.ce-editorjsColumns_wrapper .ce-editorjsColumns_col{
  border: 2px dashed #efefef;
  padding: 15px; 
  min-height: 100px;
}




/* OPTIONAL STYLES */

/* 
These styles are not required, they do not enforce the column layout, but do add some opinionated styling

*/
.editorjs-wrapper{
  border: 1px solid #eee;
  border-radius: 5px;
  padding:0px;
  margin-bottom: 10px;
}

.ce-editorjsColumns_wrapper .ce-editorjsColumns_col{
  /* border: 2px dashed #efefef; */
  /* margin: 15px; 
  padding: 15px; */

  border-radius: 10px;
  border: 2px dashed #efefef;
  /* min-height: 150px; */

}

.ce-editorjsColumns_wrapper .ce-editorjsColumns_col:hover{
  border: 2px dashed #b3bec7;
}

/* Styles copied from example.html to visually match the demo
   - adds subtle box-shadow on the editor wrapper
   - adds same column container styles and focus state
*/
.editorjs-wrapper{
  /* subtle elevation to match example demo */
  box-shadow: 0 6px 18px #e8edfa80;
}

.ce-editorjsColumns_col{
  border: 1px solid #eee;
  border-radius: 5px;
  gap: 10px;
  padding-top: 10px;
}

.ce-editorjsColumns_col:focus-within{
  box-shadow: 0 6px 18px #e8edfa80;
}

</style>

</body>
</html>
