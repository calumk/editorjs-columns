<svg xmlns="http://www.w3.org/2000/svg" width="20" height="14" viewBox="0 0 20 14">
  <!-- Columns with shift indication -->
  <g stroke="currentColor" fill="none" stroke-width="1.3">
    <!-- First column (moving right) -->
    <rect x="2" y="4" width="5" height="7" rx="0.5" opacity="0.7"/>
    <!-- Second column (center) -->
    <rect x="7.5" y="4" width="5" height="7" rx="0.5"/>
    <!-- Third column (moving left) -->
    <rect x="13" y="4" width="5" height="7" rx="0.5" opacity="0.7"/>
    <!-- Arrows showing circular motion -->
    <path d="M 6 2 L 8 2" stroke-linecap="round"/>
    <path d="M 8 2 L 7.5 1.5" stroke-linecap="round"/>
    <path d="M 14 12 L 12 12" stroke-linecap="round"/>
    <path d="M 12 12 L 12.5 12.5" stroke-linecap="round"/>
  </g>
</svg>